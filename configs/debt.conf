# Test Regions Configuration
# Format: label|crop_geometry|shave|whitelist|options|expected
#
# crop_geometry : WxH+X+Y
# shave         : pixels to trim from all edges e.g. 30x30, use 0x0 for none
# whitelist     : allowed characters, leave empty for all characters
# options       : invert, scale2x, scale3x (comma separated), leave empty for none
# expected      : expected OCR result, leave empty to skip validation (SKIP)
#
# Examples:
US National Debt|1074x114+426+470|0x0|0123456789$,||
