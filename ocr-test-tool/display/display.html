<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow:   hidden;
      width:      100vw;
      height:     100vh;
      display:    flex;
      align-items:     center;
      justify-content: center;
    }

    canvas {
      display: block;
      /* Fill the window while preserving the 16:9 aspect ratio */
      max-width:  100vw;
      max-height: 100vh;
      object-fit: contain;
    }

    #warn {
      position:    fixed;
      top:         8px;
      left:        50%;
      transform:   translateX(-50%);
      background:  rgba(220,38,38,.85);
      color:       #fff;
      font-family: monospace;
      font-size:   13px;
      padding:     6px 14px;
      border-radius: 4px;
      display:     none;
      z-index:     999;
    }

    #esc-hint {
      position:    fixed;
      bottom:      10px;
      right:       14px;
      color:       rgba(255,255,255,.35);
      font-family: monospace;
      font-size:   12px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="warn"></div>
<canvas id="display-canvas"></canvas>
<div id="esc-hint">Esc to close</div>

<script src="display.js"></script>
</body>
</html>
